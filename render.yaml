services:
  - type: web
    name: ivest-find
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: VITE_VERTEX_AI_API_KEY
        sync: false
      - key: VERTEX_AI_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: VITE_EXA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: EXPLORIUM_API_KEY
        sync: false
      - key: VITE_EXPLORIUM_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: OCEAN_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: VITE_MAIL_FROM_EMAIL
        sync: false
      - key: FOLLOW_UP_GEMINI_MODEL
        sync: false
